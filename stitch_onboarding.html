<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Client Intake - NutriCore</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-fixed": "#002113",
                      "surface-variant": "#dce2f3",
                      "on-tertiary": "#ffffff",
                      "tertiary-container": "#e29100",
                      "primary-container": "#10b981",
                      "outline": "#6c7a71",
                      "on-error": "#ffffff",
                      "inverse-surface": "#2a313d",
                      "surface-dim": "#d3daea",
                      "on-surface": "#151c27",
                      "on-background": "#151c27",
                      "surface-container-lowest": "#ffffff",
                      "surface-container-highest": "#dce2f3",
                      "error-container": "#ffdad6",
                      "inverse-primary": "#4edea3",
                      "on-surface-variant": "#3c4a42",
                      "background": "#f9f9ff",
                      "tertiary-fixed-dim": "#ffb95f",
                      "inverse-on-surface": "#ebf1ff",
                      "surface-container": "#e7eefe",
                      "tertiary-fixed": "#ffddb8",
                      "surface": "#f9f9ff",
                      "tertiary": "#855300",
                      "on-primary": "#ffffff",
                      "primary": "#006c49",
                      "secondary-fixed-dim": "#adc6ff",
                      "on-secondary-fixed-variant": "#004395",
                      "on-secondary": "#ffffff",
                      "on-tertiary-container": "#523200",
                      "secondary-container": "#2170e4",
                      "on-tertiary-fixed-variant": "#653e00",
                      "primary-fixed": "#6ffbbe",
                      "on-secondary-fixed": "#001a42",
                      "on-primary-container": "#00422b",
                      "surface-bright": "#f9f9ff",
                      "error": "#ba1a1a",
                      "secondary": "#0058be",
                      "outline-variant": "#bbcabf",
                      "surface-container-high": "#e2e8f8",
                      "primary-fixed-dim": "#4edea3",
                      "on-tertiary-fixed": "#2a1700",
                      "surface-tint": "#006c49",
                      "on-error-container": "#93000a",
                      "surface-container-low": "#f0f3ff",
                      "secondary-fixed": "#d8e2ff",
                      "on-primary-fixed-variant": "#005236",
                      "on-secondary-container": "#fefcff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "base": "8px",
                      "gutter": "24px",
                      "sm": "12px",
                      "md": "24px",
                      "lg": "40px",
                      "xl": "64px",
                      "margin": "32px",
                      "xs": "4px",
                      "container-max": "1440px"
              },
              "fontFamily": {
                      "body-sm": ["Manrope"],
                      "label-caps": ["Manrope"],
                      "body-md": ["Manrope"],
                      "h2": ["Manrope"],
                      "h3": ["Manrope"],
                      "body-lg": ["Manrope"],
                      "h1": ["Manrope"],
                      "data-tabular": ["Manrope"]
              },
              "fontSize": {
                      "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                      "label-caps": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                      "h2": ["28px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "h3": ["20px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}],
                      "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                      "h1": ["36px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "data-tabular": ["14px", {"lineHeight": "1.2", "letterSpacing": "0", "fontWeight": "500"}]
              }
            }
          }
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for clean aesthetic */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #dce2f3; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #bbcabf; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center py-xl">
<!-- 
        Navigation is SUPPRESSED. 
        Reason: Transactional/Linear intent (Onboarding flow). 
        The focus must remain solely on form completion.
    -->
<main class="w-full max-w-3xl px-gutter">
<!-- Header & Progress -->
<header class="mb-lg">
<div class="flex items-center gap-sm mb-md text-surface-tint">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
<span class="font-label-caps text-label-caps uppercase tracking-wider">Cancel Intake</span>
</div>
<h1 class="font-h1 text-h1 text-on-background mb-md">New Client Intake</h1>
<!-- Segmented Progress Bar -->
<div class="flex items-center w-full gap-xs mb-sm">
<div class="h-2 flex-1 bg-primary rounded-full"></div>
<div class="h-2 flex-1 bg-surface-container-high rounded-full"></div>
<div class="h-2 flex-1 bg-surface-container-high rounded-full"></div>
<div class="h-2 flex-1 bg-surface-container-high rounded-full"></div>
</div>
<div class="flex justify-between w-full font-label-caps text-label-caps text-on-surface-variant">
<span class="text-primary">Personal Info</span>
<span>Health Data</span>
<span>Preferences</span>
<span>Goals &amp; Notes</span>
</div>
</header>
<form class="space-y-lg">
<!-- Section 1: Personal Info -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] border border-outline-variant/30 overflow-hidden">
<div class="px-md py-md border-b border-surface-variant bg-surface-container-low/50 flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[18px]">person</span>
</div>
<h2 class="font-h3 text-h3 text-on-surface">Personal Information</h2>
</div>
<div class="p-md grid grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="col-span-1 md:col-span-2 flex gap-md items-center mb-sm">
<div class="w-20 h-20 rounded-full bg-surface-container-high border border-outline-variant flex flex-col items-center justify-center text-on-surface-variant cursor-pointer hover:bg-surface-dim transition-colors">
<span class="material-symbols-outlined mb-xs">add_a_photo</span>
<span class="font-label-caps text-[10px]">Upload</span>
</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">
                            Add a profile picture (optional)
                        </div>
</div>
<div>
<label class="font-label-caps text-label-caps text-on-surface-variant mb-base block uppercase tracking-wider">First Name</label>
<input class="w-full font-body-md text-body-md text-on-surface bg-surface border border-outline-variant rounded-DEFAULT px-sm py-[10px] focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition-all placeholder:text-outline-variant" placeholder="e.g. Jane" type="text"/>
</div>
<div>
<label class="font-label-caps text-label-caps text-on-surface-variant mb-base block uppercase tracking-wider">Last Name</label>
<input class="w-full font-body-md text-body-md text-on-surface bg-surface border border-outline-variant rounded-DEFAULT px-sm py-[10px] focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition-all placeholder:text-outline-variant" placeholder="e.g. Doe" type="text"/>
</div>
<div>
<label class="font-label-caps text-label-caps text-on-surface-variant mb-base block uppercase tracking-wider">Age</label>
<input class="w-full font-body-md text-body-md text-on-surface bg-surface border border-outline-variant rounded-DEFAULT px-sm py-[10px] focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition-all" placeholder="Years" type="number"/>
</div>
<div>
<label class="font-label-caps text-label-caps text-on-surface-variant mb-base block uppercase tracking-wider">Biological Sex</label>
<select class="w-full font-body-md text-body-md text-on-surface bg-surface border border-outline-variant rounded-DEFAULT px-sm py-[10px] focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition-all appearance-none">
<option disabled="" selected="" value="">Select...</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>
</div>
<div class="col-span-1 md:col-span-2">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-base block uppercase tracking-wider">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full font-body-md text-body-md text-on-surface bg-surface border border-outline-variant rounded-DEFAULT pl-10 pr-sm py-[10px] focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition-all" placeholder="client@example.com" type="email"/>
</div>
</div>
</div>
</section>
<!-- Section 2: Health Data -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] border border-outline-variant/30 overflow-hidden opacity-50 pointer-events-none filter grayscale-[50%] transition-all">
<div class="px-md py-md border-b border-surface-variant bg-surface-container-low/50 flex items-center justify-between">
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-outline">
<span class="material-symbols-outlined text-[18px]">favorite</span>
</div>
<h2 class="font-h3 text-h3 text-on-surface">Health Data</h2>
</div>
<span class="font-label-caps text-label-caps text-outline-variant">Step 2</span>
</div>
<!-- Content minimized/disabled for visual progression simulation -->
<div class="p-md text-center py-xl">
<span class="material-symbols-outlined text-4xl text-outline-variant mb-sm">lock</span>
<p class="font-body-sm text-body-sm text-on-surface-variant">Complete Personal Information to unlock</p>
</div>
</section>
<!-- Action Bar -->
<div class="pt-md flex justify-end gap-sm items-center sticky bottom-md bg-background/80 backdrop-blur-sm p-sm rounded-xl border border-surface-variant">
<button class="font-label-caps text-label-caps px-md py-[12px] rounded-DEFAULT text-on-surface-variant hover:bg-surface-container transition-colors uppercase tracking-wider" type="button">
                    Save Draft
                </button>
<button class="font-label-caps text-label-caps px-xl py-[12px] rounded-DEFAULT bg-primary text-on-primary hover:bg-primary/90 transition-colors uppercase tracking-wider shadow-sm flex items-center gap-xs" type="button">
                    Continue to Health Data
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
</main>
</body></html>
